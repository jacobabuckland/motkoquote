<body style="margin:0;padding:0;background-color:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f7f7f7;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;background-color:#ffffff;border:1px solid #dddddd;border-radius:12px;">
          <tr>
            <td style="padding:40px;">
              <p style="margin:0 0 32px;font-size:18px;font-weight:700;letter-spacing:0.3px;color:#004225;">Motko</p>
              <h2 style="margin:0 0 12px;font-size:20px;line-height:1.3;color:#222222;">Confirm your email address</h2>
              <p style="margin:0 0 28px;font-size:15px;line-height:1.6;color:#717171;">
                Thanks for signing up to Motko. Click the button below to confirm your email address and finish setting up your account.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-radius:8px;background-color:#004225;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 28px;font-size:15px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:8px;">Confirm email address</a>
                  </td>
                </tr>
              </table>
              <p style="margin:32px 0 0;padding-top:24px;border-top:1px solid #dddddd;font-size:13px;line-height:1.6;color:#717171;">
                If you didn't create an account with Motko, you can safely ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
